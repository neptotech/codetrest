<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codetrest</title>
    <script src="./tailwind.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/solarized-light.min.css" id="highlight-theme-light">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" id="highlight-theme-dark" disabled>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Source+Sans+Pro:wght@300;400;600;700&display=swap');

        :root {
            /* Solarized Light (Default) */
            --base02: #073642;
            --base04:#073642;
            --base01: #586e75;
            --base00: #657b83;
            --base1: #93a1a1;
            --base2: #eee8d5;
            --base3: #fdf6e3;
            --base5: #fdf6e3;
            --yellow: #b58900;
            --orange: #cb4b16;
            --red: #dc322f;
            --magenta: #d33682;
            --violet: #6c71c4;
            --blue: #268bd2;
            --cyan: #2aa198;
            --green: #859900;
            --code-font: 'Fira Code';
        }

        [data-theme="dark"] {
            /* Atom Material Dark Theme */
            --base02: #cccccc;
            --base04:#20292e;
            --base01: #afb6b9;
            --base00: #c5c5c5;
            --base1: #7db2c5;
            --base2: #232e33;
            --base3: #263238; 
            --base5: #cfd8dc;
            --yellow: #ffcb6b;
            --orange: #f78c6c;
            --red: #ff5370;
            --magenta: #c792ea;
            --violet: #bb80b3;
            --blue: #82aaff;
            --cyan: #baecff;
            --green: #c3e88d;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--base3);
            color: var(--base00);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        h1, h2, h3, h4, h5, h6 {
            transition: color 0.3s ease;
        }

        .code-font {
            font-family: var(--code-font), monospace;
        }

        /* Theme toggle button */
        .theme-toggle-btn {
            background: var(--base3);
            color: var(--base00);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 40px;
            transition: all 0.3s ease;
        }

        .theme-toggle-btn:hover {
            background: var(--base02) !important;
        }
        .theme-toggle-btn:hover {
            transform: scale(1.05);
        }

        .theme-toggle-btn i {
            transition: transform 0.3s ease;
        }
        .theme-toggle-btn:hover i{
            color:var(--base3) !important;
        }
        #viewModalTitle,#closeViewModalBtn {
            color:var(--base5) !important;
        }

        .theme-toggle-btn:active i {
            transform: rotate(20deg);
        }

        .markdown-content img {
            max-width: 100%;
        }

        .markdown-content pre {
            border-radius: 0.375rem;
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .tab-active {
            border-bottom: 2px solid var(--blue);
            color: var(--blue);
        }

        .tag-chip {
            transition: all 0.2s ease;
        }

        .tag-chip:hover {
            transform: translateY(-1px);
        }

        .card-hover {
            transition: all 0.2s ease, background-color 0.3s ease;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Theme-aware element styles */
        header {
            background-color: var(--base2) !important;
            border-color: var(--base1) !important;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        header h1, #viewSnippetTitle, #viewSnippetDesc {
            color: var(--base02) !important;
        }

        header .fa-code {
            color: var(--blue) !important;
        }

        #searchInput {
            background-color: var(--base3) !important;
            color: var(--base00) !important;
            border-color: var(--base1) !important;
        }

        #searchInput::placeholder {
            color: var(--base1);
        }

        .sidebar {
            background-color: var(--base2) !important;
            border-color: var(--base1) !important;
        }

        .sidebar > div {
            background-color: var(--base2) !important;
            border-color: var(--base1) !important;
        }

        .sidebar h2,
        .sidebar h3 {
            color: var(--base00) !important;
        }

        .sidebar select {
            background-color: var(--base3) !important;
            color: var(--base00) !important;
            border-color: var(--base1) !important;
        }

        .sidebar button {
            transition: all 0.3s ease;
        }

        .sidebar #addSnippetBtn {
            background-color: var(--blue) !important;
            color: white !important;
        }

        .sidebar #addSnippetBtn:hover {
            opacity: 0.9;
        }

        /* Snippet cards */
        .card-hover {
            background-color: var(--base2) !important;
            border-color: var(--base1) !important;
        }

        .card-hover h3 {
            color: var(--base02) !important;
        }

        .card-hover p {
            color: var(--base01) !important;
        }

        .card-hover .tag-chip {
            background-color: var(--cyan) !important;
            color: var(--base3) !important;
        }

        .card-hover > div:last-child {
            background-color: var(--base3) !important;
            border-color: var(--base1) !important;
            color: var(--base01) !important;
        }

        .card-hover button {
            color: var(--base01) !important;
        }

        .card-hover button:hover {
            color: var(--blue) !important;
        }

        /* Stats cards */
        .stats-card {
            background-color: var(--base3) !important;
            border-color: var(--base1) !important;
        }

        .stats-card p:first-child {
            color: var(--base01) !important;
        }

        .stats-card p:last-child {
            color: var(--base00) !important;
        }

        /* Empty state */
        #emptyState {
            color: var(--base01) !important;
        }

        #emptyState h2 {
            color: var(--base02) !important;
        }

        /* Tabs */
        .tab-btn {
            color: var(--base01) !important;
            border-color: transparent !important;
        }

        .tab-btn:hover {
            color: var(--base00) !important;
        }

        .tab-active {
            color: var(--blue) !important;
            border-color: var(--blue) !important;
        }

        /* Tag filters */
        .tag-chip {
            background-color: var(--base3) !important;
            color: var(--base00) !important;
            border-color: var(--base1) !important;
        }

        .tag-chip:hover {
            background-color: var(--cyan) !important;
            color: var(--base3) !important;
        }

        .tag-chip.bg-\[--cyan\] {
            background-color: var(--cyan) !important;
            color: var(--base3) !important;
        }

        /* Modals */
        .modal-content {
            background-color: var(--base2) !important;
            border-color: var(--base1) !important;
        }

        .modal-header,#closeViewModalBtn2 {
            background-color: var(--base04) !important;
            border-color: var(--base1) !important;
        }

        #closeViewModalBtn2  {
            color: var(--base5) !important;
        }

        .modal-header button {
            color: var(--base1) !important;
        }

        .modal-header button:hover {
            color: var(--base3) !important;
        }

        .modal-body label {
            color: var(--base00) !important;
        }

        .modal-body input,
        .modal-body textarea {
            background-color: var(--base3) !important;
            color: var(--base00) !important;
            border-color: var(--base1) !important;
        }

        .modal-body input::placeholder,
        .modal-body textarea::placeholder {
            color: var(--base1);
        }

        .modal-body #previewArea,
        .modal-body #viewSnippetContent {
            background-color: var(--base3) !important;
            border-color: var(--base1) !important;
        }

        .modal-footer {
            background-color: var(--base2) !important;
            border-color: var(--base1) !important;
        }

        /* Buttons */
        button {
            transition: all 0.3s ease;
        }

        .btn-primary {
            background-color: var(--blue) !important;
            color: white !important;
        }

        .btn-primary:hover {
            background-color: var(--cyan) !important;
        }

        .btn-secondary {
            background-color: var(--base1) !important;
            color: var(--base3) !important;
        }

        .btn-danger {
            background-color: var(--red) !important;
            color: white !important;
        }

        .btn-success {
            background-color: var(--green) !important;
            color: var(--base3) !important;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--base2);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--base1);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--base01);
        }

        /* Animation for newly added snippets */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .new-snippet {
            animation: fadeIn 0.3s ease-out;
        }

        /* Markdown content styles */
        .markdown-content {
            line-height: 1.6;
        }

        .markdown-content h1,
        .markdown-content h2,
        .markdown-content h3,
        .markdown-content h4,
        .markdown-content h5,
        .markdown-content h6 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--base02);
        }

        .markdown-content h1 { font-size: 2rem; }
        .markdown-content h2 { font-size: 1.5rem; }
        .markdown-content h3 { font-size: 1.25rem; }

        .markdown-content p {
            margin-bottom: 1rem;
        }

        .markdown-content ul,
        .markdown-content ol {
            margin-bottom: 1rem;
            padding-left: 2rem;
        }

        .markdown-content li {
            margin-bottom: 0.5rem;
        }

        .markdown-content a {
            color: var(--blue);
            text-decoration: underline;
        }

        .markdown-content a:hover {
            color: var(--cyan);
        }

        .markdown-content blockquote {
            border-left: 4px solid var(--blue);
            padding-left: 1rem;
            margin: 1rem 0;
            color: var(--base01);
            font-style: italic;
        }

        .markdown-content code {
            font-family: var(--code-font), monospace;
            font-weight: 500;
            background: var(--base2);
            color: var(--cyan);
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.9em;
        }

        .markdown-content pre {
            background: var(--base3);
            padding: 1rem;
            border-radius: 0.375rem;
            overflow-x: auto;
            margin: 1rem 0;
            border: 1px solid var(--base1);
        }

        .markdown-content pre code {
            background: transparent;
            padding: 0;
            color: var(--base00);
            display: block;
        }

        /* GFM Tables */
        .markdown-content table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            border: 1px solid var(--base01);
        }

        .markdown-content th,
        .markdown-content td {
            border: 1px solid var(--base01);
            padding: 0.5rem 0.75rem;
            text-align: left;
        }

        .markdown-content th {
            background: var(--base2);
            font-weight: 600;
            color: var(--base02);
        }

        .markdown-content tr:nth-child(even) {
            background: var(--base3);
        }

        /* GFM Task lists */
        .markdown-content ul.contains-task-list {
            list-style: none;
            padding-left: 0.5rem;
        }

        .markdown-content li.task-list-item {
            list-style: none;
        }

        .markdown-content li.task-list-item input[type="checkbox"] {
            margin-right: 0.5rem;
        }

        /* Strikethrough */
        .markdown-content del {
            text-decoration: line-through;
            color: var(--base01);
        }

        /* rehype-pretty-code styles */
        .markdown-content pre code {
            display: grid;
        }

        .markdown-content .highlighted-line {
            background: rgba(181, 137, 0, 0.15);
            border-left: 3px solid var(--yellow);
            margin-left: -0.5rem;
            padding-left: 0.5rem;
        }

        .markdown-content .highlighted-word {
            background: rgba(38, 139, 210, 0.2);
            border-radius: 0.25rem;
            padding: 0 0.15rem;
        }

        /* Highlight.js override for Solarized Light theme compatibility */
        .markdown-content .hljs {
            background: var(--base3);
            color: var(--base00);
        }
        
        /* Ensure code blocks in tables also use light background */
        .markdown-content table code {
            background: var(--base3);
        }

        /* Code block toolbar styles */
        .code-block-wrapper {
            position: relative;
            margin: 1rem 0;
        }

        .code-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--base2);
            border: 1px solid var(--base1);
            border-bottom: none;
            border-radius: 0.375rem 0.375rem 0 0;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
        }

        .code-language {
            font-family: var(--code-font), monospace;
            font-weight: 600;
            color: var(--base01);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .code-copy-btn {
            background: transparent;
            border: 1px solid var(--base1);
            color: var(--base00);
            padding: 0.25rem 0.75rem;
            border-radius: 0.25rem;
            cursor: pointer;
            font-family: 'Source Sans Pro', sans-serif;
            font-size: 0.75rem;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .code-copy-btn:hover {
            background: var(--base3);
            border-color: var(--blue);
            color: var(--blue);
        }

        .code-copy-btn:active {
            transform: scale(0.95);
        }

        .code-copy-btn i {
            font-size: 0.875rem;
        }

        /* Adjust pre element when in wrapper */
        .code-block-wrapper pre {
            margin: 0;
            border-radius: 0 0 0.375rem 0.375rem;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <!-- Header -->
    <header class="bg-[#eee8d5] border-b border-[#93a1a1]">
        <div class="container mx-auto px-4 py-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <div class="flex items-center mb-4 md:mb-0">
                    <i class="fas fa-code text-3xl text-[#268bd2] mr-3"></i>
                    <h1 class="text-2xl font-bold text-[#073642]">Codetrest</h1>
                </div>
                <div class="relative w-full md:w-96 flex items-center gap-3">
                    <input type="text" id="searchInput" placeholder="Search snippets..."
                        class="w-full pl-10 pr-4 py-2 rounded-lg border border-[#93a1a1] focus:outline-none focus:ring-2 focus:ring-[#268bd2] bg-[#fdf6e3] text-[#657b83]">
                    <i class="fas fa-search absolute left-3 top-3 text-[#93a1a1]"></i>

                    <button id="themeToggle" class="theme-toggle-btn p-2 rounded-lg border border-[#93a1a1] hover:bg-[#eee8d5] transition-colors" title="Toggle theme">
                        <i class="fas fa-moon text-[#657b83]"></i>
                    </button>

                    <span id="folderStatus" class="text-xs text-[#586e75]"></span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-6 flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 mb-6 md:mb-0 md:mr-6 sidebar">
            <div class="bg-[#eee8d5] rounded-lg p-4 shadow-sm border border-[#93a1a1]">
                <h2 class="font-semibold text-lg mb-4 text-[#073642]">Filters</h2>
                <div class="mb-6">
                    <h3 class="font-medium mb-2 text-[#586e75]">Tags</h3>
                    <div id="tagFilters" class="flex flex-wrap gap-2">
                        <!-- Tags will be populated here -->
                    </div>
                </div>
                <div>
                    <h3 class="font-medium mb-2 text-[#586e75]">Sort by</h3>
                    <select id="sortSelect"
                        class="w-full p-2 border border-[#93a1a1] rounded bg-[#fdf6e3] focus:outline-none focus:ring-2 focus:ring-[#268bd2]">
                        <option value="newest">Newest first</option>
                        <option value="oldest">Oldest first</option>
                        <option value="title-asc">Title (A-Z)</option>
                        <option value="title-desc">Title (Z-A)</option>
                    </select>
                </div>
                <button id="addSnippetBtn"
                    class="mt-6 w-full bg-[#268bd2] hover:bg-[#1e6fad] text-white py-2 px-4 rounded-lg transition flex items-center justify-center">
                    <i class="fas fa-plus mr-2"></i> Add Snippet
                </button>
            </div>

            <div class="mt-6 bg-[#eee8d5] rounded-lg p-4 shadow-sm border border-[#93a1a1]">
                <h3 class="font-medium mb-3 text-[#586e75]">Quick Stats</h3>
                <div class="grid grid-cols-2 gap-3">
                    <div class="stats-card bg-[#fdf6e3] p-2 rounded border border-[#93a1a1]">
                        <p class="text-xs text-[#586e75]">Total Snippets</p>
                        <p class="font-bold text-lg" id="totalSnippets">0</p>
                    </div>
                    <div class="stats-card bg-[#fdf6e3] p-2 rounded border border-[#93a1a1]">
                        <p class="text-xs text-[#586e75]">Total Tags</p>
                        <p class="font-bold text-lg" id="totalTags">0</p>
                    </div>
                    <div class="stats-card bg-[#fdf6e3] p-2 rounded border border-[#93a1a1]">
                        <p class="text-xs text-[#586e75]">Updated Today</p>
                        <p class="font-bold text-lg" id="updatedToday">0</p>
                    </div>
                    <div class="stats-card bg-[#fdf6e3] p-2 rounded border border-[#93a1a1]">
                        <p class="text-xs text-[#586e75]">Last Added</p>
                        <p class="font-bold text-xs truncate" id="lastAdded">None</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-grow flex flex-col">
            <!-- Tabs -->
            <div class="flex border-b border-[#93a1a1] mb-6">
                <button id="allTab" class="tab-btn tab-active px-4 py-2 font-medium text-[#073642]">All Snippets</button>
                <button id="favoritesTab" class="tab-btn px-4 py-2 font-medium text-[#073642]">Favorites</button>
                <button id="recentTab" class="tab-btn px-4 py-2 font-medium text-[#073642]">Recently Viewed</button>
            </div>

            <!-- Snippets List -->
            <div id="snippetsContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- Snippet cards will be populated here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="flex-grow flex flex-col items-center justify-center text-center py-16">
                <i class="fas fa-code text-6xl text-[#93a1a1] mb-4"></i>
                <h3 class="text-xl font-medium text-[#586e75] mb-2">No snippets found</h3>
                <p class="text-[#93a1a1] mb-6">Create your first snippet or adjust your search.</p>
                <button id="addFirstSnippetBtn"
                    class="bg-[#268bd2] hover:bg-[#1e6fad] text-white py-2 px-6 rounded-lg transition">
                    Add Snippet
                </button>
            </div>
        </div>
    </main>

    <!-- Snippet Modal -->
    <div id="snippetModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="modal-content bg-[#eee8d5] rounded-lg w-full max-w-3xl max-h-[90vh] mx-4 overflow-hidden flex flex-col"
            style="min-height: 500px;">
            <div class="modal-header bg-[#073642] p-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-[#93a1a1]" id="modalTitle">Add New Snippet</h2>
                <button id="closeModalBtn" class="text-[#93a1a1] hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body p-4 flex-grow overflow-auto">
                <form id="snippetForm">
                    <input type="hidden" id="snippetId">
                    <div class="mb-4">
                        <label for="snippetTitle" class="block text-sm font-medium text-[#586e75] mb-1">Title</label>
                        <input type="text" id="snippetTitle" required
                            class="w-full p-2 border border-[#93a1a1] rounded bg-[#fdf6e3] focus:outline-none focus:ring-2 focus:ring-[#268bd2]">
                    </div>
                    <div class="mb-4">
                        <label for="snippetDesc"
                            class="block text-sm font-medium text-[#586e75] mb-1">Description</label>
                        <textarea id="snippetDesc" rows="3"
                            class="w-full p-2 border border-[#93a1a1] rounded bg-[#fdf6e3] focus:outline-none focus:ring-2 focus:ring-[#268bd2]"></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="snippetTags" class="block text-sm font-medium text-[#586e75] mb-1">Tags (comma
                            separated)</label>
                        <input type="text" id="snippetTags"
                            class="w-full p-2 border border-[#93a1a1] rounded bg-[#fdf6e3] focus:outline-none focus:ring-2 focus:ring-[#268bd2]"
                            placeholder="Comma separated tags..">
                    </div>
                    <div class="mb-4">
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-sm font-medium text-[#586e75]">Content</label>
                        </div>
                        <textarea id="snippetContent" rows="10" required
                            class="w-full p-2 border border-[#93a1a1] rounded bg-[#fdf6e3] font-mono text-sm focus:outline-none focus:ring-2 focus:ring-[#268bd2]"
                            placeholder="Markdown content goes here.."></textarea>
                    </div>
                </form>

                <!-- Preview Area -->
                <div id="previewArea" class="mt-4 p-4 bg-white rounded markdown-content border border-[#93a1a1]"></div>
            </div>
            <div class="modal-footer p-4 border-t border-[#93a1a1] bg-[#fdf6e3] flex justify-end space-x-2">
                <button id="deleteSnippetBtn"
                    class="hidden btn-danger bg-[#dc322f] hover:bg-[#bd2a27] text-white py-2 px-4 rounded-lg transition">
                    Delete
                </button>
                <button id="cancelBtn"
                    class="btn-secondary bg-[#93a1a1] hover:bg-[#839496] text-white py-2 px-4 rounded-lg transition">
                    Cancel
                </button>
                <button type="submit" form="snippetForm"
                    class="btn-success bg-[#859900] hover:bg-[#738a00] text-white py-2 px-4 rounded-lg transition">
                    Save
                </button>
            </div>
        </div>
    </div>

    <!-- View Snippet Modal -->
    <div id="viewModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="modal-content bg-[#eee8d5] rounded-lg w-full max-w-4xl max-h-[90vh] mx-4 overflow-hidden flex flex-col">
            <div class="modal-header bg-[#073642] p-4 flex justify-between items-center">
                <h2 class="text-lg font-semibold text-[#93a1a1]" id="viewModalTitle">Snippet Details</h2>
                <button id="closeViewModalBtn" class="text-[#93a1a1] hover:text-white">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body p-6 overflow-auto">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 class="text-2xl font-bold text-[#073642] mb-2" id="viewSnippetTitle"></h2>
                        <p class="text-[#586e75]" id="viewSnippetDesc"></p>
                    </div>
                    <div class="flex space-x-2">
                        <button id="editSnippetBtn"
                            class="bg-[#268bd2] hover:bg-[#1e6fad] text-white py-1 px-3 rounded text-sm">
                            <i class="fas fa-edit mr-1"></i> Edit
                        </button>
                        <button id="favoriteBtn"
                            class="bg-[#b58900] hover:bg-[#9c7b00] text-white py-1 px-3 rounded text-sm">
                            <i class="far fa-star mr-1"></i> Favorite
                        </button>
                    </div>
                </div>

                <div class="flex flex-wrap gap-2 mb-6" id="viewSnippetTags"></div>

                <div class="bg-white p-4 rounded-lg markdown-content" id="viewSnippetContent"></div>

                <div class="mt-6 pt-4 border-t border-[#93a1a1] text-sm text-[#586e75]">
                    <p>Last updated: <span id="viewSnippetUpdated"></span></p>
                </div>
            </div>
            <div class="modal-footer p-4 border-t border-[#93a1a1] bg-[#fdf6e3] flex justify-end">
                <button id="closeViewModalBtn2"
                    class="btn-secondary bg-[#93a1a1] hover:bg-[#839496] text-white py-2 px-4 rounded-lg transition">
                    Close
                </button>
            </div>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
